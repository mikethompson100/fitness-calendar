<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Accountability Calendar</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Fitness Accountability Calendar</h1>
      </header>
      <main>
        <section>
          <p id="status-message">
            Welcome to the dashboard. This dashboard is designed to show you
            your workouts and provide accountability and structure.
          </p>
        </section>
      </main>

      <div id="form-container">
        <form id="showNewUserForm">
          <label for="nameInput">Name:</label>
          <input type="text" id="nameInput" placeholder="Your name" />

          <label for="messageInput">Message:</label>
          <textarea id="messageInput" placeholder="Say something..."></textarea>

          <button type="submit">Submit</button>

          <div id="output"></div>
        </form>
      </div>
    </div>
    <script src="js/data/initData.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
