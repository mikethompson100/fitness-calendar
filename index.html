<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Accountability Calendar</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="wrapper">
      <header id="header-container">
        <h1>Fitness Accountability Calendar</h1>
        <p id="status-message">
          Welcome to the dashboard. This dashboard is designed to show you your
          workouts and provide accountability and structure.
        </p>
      </header>
      <main id="main-container">MAIN</main>

      <div id="form-container">
        <form id="showNewUserForm">
          <fieldset>
            <legend>
              <h2>
                Please provide your name and what your overall fitness goal is.
              </h2>
            </legend>
            <label for="nameInput">Name:</label>
            <input
              type="text"
              id="nameInput"
              placeholder="Your name"
              size="25"
              maxlength="25"
            /><br />

            <label for="goalInput">Message:</label>
            <textarea
              id="goalInput"
              placeholder="Enter your overall fitness goal..."
              cols="50"
              rows="10"
              maxlength="300"
            ></textarea>

            <button type="submit">Submit</button>

            <div id="output"></div>
          </fieldset>
        </form>
      </div>
    </div>
    <script src="js/data/initData.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
